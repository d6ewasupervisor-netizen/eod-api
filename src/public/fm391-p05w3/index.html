<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>FM391 P05W3 Photos</title>
  <link rel="stylesheet" href="/fm391-p05w3/assets/styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <p class="eyebrow">FM391 photo capture</p>
      <h1>P05W3 bay photos</h1>
      <div class="progress-wrap" aria-live="polite">
        <div class="progress-label">
          <span id="progress-text">Loading...</span>
        </div>
        <div class="progress-bar" aria-hidden="true">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="actions">
        <button class="button button-primary" id="send-button" type="button" disabled>Send unsent photos</button>
        <button class="button button-secondary" id="resend-button" type="button" disabled>Resend all captured</button>
        <button class="button button-danger" id="clear-button" type="button">Clear device photos</button>
      </div>
      <div class="status" id="status" role="status"></div>
    </section>

    <div class="set-list" id="set-list"></div>
  </main>

  <script src="/fm391-p05w3/assets/manifest.js"></script>
  <script src="/fm391-p05w3/assets/app.js"></script>
</body>
</html>
