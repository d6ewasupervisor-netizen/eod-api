<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Survey Admin — Division 701</title>
<script src="/auth-gate.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --ink:#1c2733; --ink-soft:#5a6b7d; --line:#d8dfe6; --paper:#f6f8fa; --card:#ffffff;
    --accent:#0f5c8c; --good:#2e7d52; --bad:#b3402a; --warn:#c98a1b; --focus:#0f5c8c;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI",system-ui,-apple-system,Arial,sans-serif;background:var(--paper);color:var(--ink);font-size:14px}
  header{background:var(--card);border-bottom:2px solid var(--accent);padding:14px 22px;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  header h1{font-size:18px;margin:0;letter-spacing:.2px}
  header .who{color:var(--ink-soft);margin-left:auto;font-size:13px}
  main{max-width:1280px;margin:0 auto;padding:18px 22px 60px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:14px 16px}
  .card .big{font-size:26px;font-weight:600}
  .card .lbl{color:var(--ink-soft);font-size:12px;text-transform:uppercase;letter-spacing:.5px}
  h2{font-size:15px;margin:22px 0 10px;color:var(--ink)}
  .trend-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px}
  .trend-card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:14px}
  .trend-card .qtext{font-size:13px;min-height:36px;margin-bottom:8px}
  .rate{font-weight:700}
  .rate.bad{color:var(--bad)} .rate.warn{color:var(--warn)} .rate.good{color:var(--good)}
  .delta{font-size:12px;color:var(--ink-soft)}
  .filters{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:14px;display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin-bottom:14px}
  .filters label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:4px}
  .filters select,.filters input{width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:6px;background:#fff;font-size:13px}
  .filters select[multiple]{height:96px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:10px 0 14px}
  button{background:var(--accent);color:#fff;border:0;border-radius:6px;padding:8px 14px;font-size:13px;cursor:pointer}
  button.secondary{background:#fff;color:var(--accent);border:1px solid var(--accent)}
  button:focus-visible,select:focus-visible,input:focus-visible{outline:2px solid var(--focus);outline-offset:1px}
  .viewbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:8px;overflow:hidden;font-size:13px}
  th,td{padding:8px 10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
  th{background:#eef2f6;cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:0}
  th .dir{color:var(--accent)}
  tr:hover td{background:#f2f6fa}
  td.problem{color:var(--bad);font-weight:600}
  .heat{display:inline-block;width:56px;height:10px;border-radius:5px;background:linear-gradient(90deg,var(--good),var(--warn),var(--bad));position:relative;vertical-align:middle;margin-right:6px}
  .heat i{position:absolute;top:-3px;width:2px;height:16px;background:var(--ink)}
  .muted{color:var(--ink-soft)}
  .tablewrap{max-height:560px;overflow:auto;border-radius:8px}
  #status{font-size:13px;color:var(--ink-soft);margin-left:auto}
  @media (prefers-reduced-motion: reduce){ *{animation:none!important;transition:none!important} }
</style>
</head>
<body>
<header>
  <h1>Division 701 — Survey Admin</h1>
  <span class="muted">In-store best practices, v2</span>
  <span class="who" id="who"></span>
</header>
<main>
  <div class="cards">
    <div class="card"><div class="big" id="c-resp">–</div><div class="lbl">Responses</div></div>
    <div class="card"><div class="big" id="c-stores">–</div><div class="lbl">Stores reporting</div></div>
    <div class="card"><div class="big" id="c-people">–</div><div class="lbl">Respondents</div></div>
    <div class="card"><div class="big" id="c-base">21</div><div class="lbl">2025 baseline stores</div></div>
  </div>

  <h2>Top trending problem questions</h2>
  <div class="trend-grid" id="trending"></div>

  <h2>Explore responses</h2>
  <div class="filters">
    <div><label for="f-district">Districts</label><select id="f-district" multiple></select></div>
    <div><label for="f-store">Stores</label><select id="f-store" multiple></select></div>
    <div><label for="f-resp">Respondents</label><select id="f-resp" multiple></select></div>
    <div><label for="f-section">Question blocks</label><select id="f-section" multiple></select></div>
    <div><label for="f-question">Individual questions</label><select id="f-question" multiple></select></div>
    <div><label for="f-status">Status</label>
      <select id="f-status">
        <option value="submitted" selected>Submitted only</option>
        <option value="all">Submitted + drafts</option>
      </select>
      <label for="f-group" style="margin-top:8px">Group rows by</label>
      <select id="f-group">
        <option value="">No grouping (flat)</option>
        <option value="district">District</option>
        <option value="store_num">Store</option>
        <option value="respondent_name">Respondent</option>
      </select>
    </div>
  </div>

  <div class="toolbar">
    <button id="apply">Apply filters</button>
    <button class="secondary" id="clear">Clear</button>
    <button class="secondary" id="exp-csv">Export CSV</button>
    <button class="secondary" id="exp-xlsx">Export XLSX</button>
    <span class="viewbar">
      <label class="muted" for="views">Saved views:</label>
      <select id="views"><option value="">— select —</option></select>
      <input id="view-name" placeholder="View name" style="width:130px;padding:6px 8px;border:1px solid var(--line);border-radius:6px">
      <button class="secondary" id="view-save">Save view</button>
      <button class="secondary" id="view-del">Delete</button>
    </span>
    <span id="status"></span>
  </div>

  <div class="tablewrap"><table id="grid"><thead></thead><tbody></tbody></table></div>
</main>

<script>
const API = (location.hostname === 'localhost') ? 'http://localhost:3001' : 'https://eod-api.the-dump-bin.com';
const authHeaders = () => ({ 'Authorization': 'Bearer ' + (localStorage.getItem('dumpBinSession') || ''), 'Content-Type': 'application/json' });
let SPEC = null, QLIST = [], DATA = [], SORT = { col: 'store_num', dir: 1 };

async function api(path, opts = {}) {
  const r = await fetch(API + path, { headers: authHeaders(), ...opts });
  if (r.status === 401) { location.href = '/signin.html?returnTo=' + encodeURIComponent(location.pathname); throw new Error('auth'); }
  if (r.status === 403) { document.body.innerHTML = '<main style="padding:40px;font-family:sans-serif">This page requires admin access. Ask me if you believe you should have it.</main>'; throw new Error('forbidden'); }
  return r.json();
}

function flatQuestions(spec) {
  const out = [];
  for (const s of spec.sections) for (const q of s.questions) {
    out.push({ ...q, section: s.id, sectionTitle: s.title });
    (q.branches || []).forEach(b => out.push({ ...b, section: s.id, sectionTitle: s.title, parent: q.id }));
  }
  return out;
}

function selected(id) { return [...document.getElementById(id).selectedOptions].map(o => o.value); }
function setSelected(id, vals) {
  const set = new Set(vals || []);
  [...document.getElementById(id).options].forEach(o => o.selected = set.has(o.value));
}
function filterQS() {
  const p = new URLSearchParams();
  const d = selected('f-district'); if (d.length) p.set('districts', d.join(','));
  const s = selected('f-store'); if (s.length) p.set('stores', s.join(','));
  const r = selected('f-resp'); if (r.length) p.set('respondents', r.join(','));
  p.set('status', document.getElementById('f-status').value);
  return p;
}
function visibleQuestionCols() {
  const secs = new Set(selected('f-section'));
  const qs = new Set(selected('f-question'));
  return QLIST.filter(q => (qs.size ? qs.has(q.id) : true) && (secs.size ? secs.has(q.section) : true));
}
function isProblem(q, val) {
  if (!q.good || val == null || val === '') return null;
  if (q.type === 'multiselect') {
    const arr = Array.isArray(val) ? val : String(val).split(',').map(x => x.trim());
    return !(arr.length === 1 && arr[0] === q.good);
  }
  return String(val).trim() !== q.good;
}

async function loadIdentity() {
  const me = await api('/api/me');
  document.getElementById('who').textContent = me.email || '';
}

async function loadFilters() {
  const f = await api('/api/survey/admin/filters');
  const dsel = document.getElementById('f-district');
  f.districts.concat(['Unassigned']).filter((v, i, a) => a.indexOf(v) === i)
    .forEach(d => dsel.add(new Option('District ' + d, d)));
  const ssel = document.getElementById('f-store');
  f.stores.forEach(s => ssel.add(new Option(`${s.store_num} (D${s.district})`, s.store_num)));
  const rsel = document.getElementById('f-resp');
  f.respondents.forEach(r => rsel.add(new Option(`${r.name} — ${r.role}`, r.email)));
}

async function loadSpec() {
  const q = await api('/api/survey/questions');
  SPEC = q.questionSet.spec; QLIST = flatQuestions(SPEC);
  const sec = document.getElementById('f-section');
  SPEC.sections.forEach(s => sec.add(new Option(`${s.id}. ${s.title}`, s.id)));
  const qsel = document.getElementById('f-question');
  QLIST.forEach(qq => qsel.add(new Option(`${qq.id} — ${qq.text.slice(0, 60)}`, qq.id)));
}

async function loadSummary() {
  const s = await api('/api/survey/admin/summary?' + filterQS().toString());
  document.getElementById('c-resp').textContent = s.totals.responses;
  document.getElementById('c-stores').textContent = s.totals.stores;
  document.getElementById('c-people').textContent = s.totals.respondents;
  const wrap = document.getElementById('trending');
  wrap.innerHTML = '';
  if (!s.trending.length) { wrap.innerHTML = '<div class="card muted">No submitted responses yet. Trending appears once at least 3 answers exist per question.</div>'; return; }
  s.trending.forEach((t, i) => {
    const card = document.createElement('div'); card.className = 'trend-card';
    const rate = Math.round(t.problemRate * 100);
    const cls = rate >= 50 ? 'bad' : rate >= 25 ? 'warn' : 'good';
    const b = s.baseline[t.id];
    const delta = b ? `2025 baseline: ${Math.round(b.problemRate * 100)}% problem (${b.n} stores)` : 'No 2025 baseline for this question';
    card.innerHTML = `<div class="qtext"><strong>${t.id}.</strong> ${t.text}</div>
      <div><span class="heat" aria-hidden="true"><i style="left:${Math.min(rate, 100) * 0.56}px"></i></span>
      <span class="rate ${cls}">${rate}% problem</span> <span class="muted">(${t.n} answers)</span></div>
      <div class="delta">${delta}</div>
      <canvas id="trend-chart-${i}" height="130" aria-label="Answer distribution for ${t.id}"></canvas>`;
    wrap.appendChild(card);
    const labels = Object.keys(t.counts), vals = labels.map(l => t.counts[l]);
    new Chart(document.getElementById('trend-chart-' + i), {
      type: 'bar',
      data: { labels, datasets: [{ data: vals, backgroundColor: labels.map(l => l === t.good ? '#2e7d52' : '#b3402a') }] },
      options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { precision: 0 } } } }
    });
  });
}

async function loadData() {
  const r = await api('/api/survey/admin/responses?' + filterQS().toString());
  DATA = r.responses;
  renderGrid();
}

function renderGrid() {
  const cols = visibleQuestionCols();
  const meta = [['store_num', 'Store'], ['district', 'District'], ['respondent_name', 'Respondent'], ['team', 'Team'], ['status', 'Status'], ['submitted_at', 'Submitted']];
  const thead = document.querySelector('#grid thead');
  const tbody = document.querySelector('#grid tbody');
  thead.innerHTML = '<tr>' + meta.concat(cols.map(c => [c.id, c.id])).map(([k, lbl]) =>
    `<th data-col="${k}" title="${cols.find(c => c.id === k)?.text || lbl}">${lbl}${SORT.col === k ? ` <span class="dir">${SORT.dir > 0 ? '▲' : '▼'}</span>` : ''}</th>`).join('') + '</tr>';

  const groupBy = document.getElementById('f-group').value;
  let rows = [...DATA];
  const getv = (r, k) => k.startsWith('Q') ? r.answers[k] : r[k];
  rows.sort((a, b) => {
    const av = getv(a, SORT.col), bv = getv(b, SORT.col);
    return (av == null) - (bv == null) || (av > bv ? 1 : av < bv ? -1 : 0);
  });
  if (SORT.dir < 0) rows.reverse();
  if (groupBy) rows.sort((a, b) => String(a[groupBy]).localeCompare(String(b[groupBy]), undefined, { numeric: true }));

  let lastGroup = null, html = '';
  for (const r of rows) {
    if (groupBy && r[groupBy] !== lastGroup) {
      lastGroup = r[groupBy];
      html += `<tr><td colspan="${meta.length + cols.length}" style="background:#e7edf3;font-weight:600">${groupBy === 'district' ? 'District ' : ''}${lastGroup}</td></tr>`;
    }
    html += '<tr>' + meta.map(([k]) => `<td>${k === 'submitted_at' && r[k] ? new Date(r[k]).toLocaleDateString() : (r[k] ?? '')}</td>`).join('') +
      cols.map(c => {
        const v = r.answers[c.id];
        const disp = v == null ? '<span class="muted">—</span>' : (Array.isArray(v) ? v.join(', ') : String(v));
        return `<td class="${isProblem(c, v) === true ? 'problem' : ''}">${disp}</td>`;
      }).join('') + '</tr>';
  }
  tbody.innerHTML = html || `<tr><td colspan="${meta.length + cols.length}" class="muted">No responses match these filters.</td></tr>`;
  document.getElementById('status').textContent = `${rows.length} rows · ${cols.length} question columns`;
  thead.querySelectorAll('th').forEach(th => th.onclick = () => {
    const col = th.dataset.col;
    SORT = { col, dir: SORT.col === col ? -SORT.dir : 1 };
    renderGrid();
  });
}

// ---- exports
document.getElementById('exp-csv').onclick = () => {
  const p = filterQS();
  const cols = visibleQuestionCols().map(c => c.id);
  if (cols.length && cols.length !== QLIST.length) p.set('questions', cols.join(','));
  const a = document.createElement('a');
  a.href = API + '/api/survey/admin/export.csv?' + p.toString() + '&access_token=' + encodeURIComponent(localStorage.getItem('dumpBinSession') || '');
  a.click();
};
document.getElementById('exp-xlsx').onclick = () => {
  const cols = visibleQuestionCols();
  const hasComment = new Set();
  DATA.forEach(r => cols.forEach(c => { if (r.answers[c.id + '_c']) hasComment.add(c.id); }));
  const rows = DATA.map(r => {
    const o = { Store: r.store_num, District: r.district, Respondent: r.respondent_name, Team: r.team, Status: r.status, Submitted: r.submitted_at };
    cols.forEach(c => {
      o[`${c.id} ${c.text.slice(0, 40)}`] = Array.isArray(r.answers[c.id]) ? r.answers[c.id].join('; ') : (r.answers[c.id] ?? '');
      if (hasComment.has(c.id)) o[`${c.id} comment`] = r.answers[c.id + '_c'] ?? '';
    });
    return o;
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Responses');
  XLSX.writeFile(wb, `survey-export-${new Date().toISOString().slice(0, 10)}.xlsx`);
};

// ---- saved views
function currentConfig() {
  return {
    districts: selected('f-district'), stores: selected('f-store'), respondents: selected('f-resp'),
    sections: selected('f-section'), questions: selected('f-question'),
    status: document.getElementById('f-status').value, group: document.getElementById('f-group').value, sort: SORT,
  };
}
function applyConfig(c) {
  setSelected('f-district', c.districts); setSelected('f-store', c.stores); setSelected('f-resp', c.respondents);
  setSelected('f-section', c.sections); setSelected('f-question', c.questions);
  document.getElementById('f-status').value = c.status || 'submitted';
  document.getElementById('f-group').value = c.group || '';
  SORT = c.sort || SORT;
  refresh();
}
async function loadViews() {
  const v = await api('/api/survey/admin/views');
  const sel = document.getElementById('views');
  sel.innerHTML = '<option value="">— select —</option>';
  v.views.forEach(x => sel.add(new Option(x.name, x.name)));
  sel.dataset.store = JSON.stringify(Object.fromEntries(v.views.map(x => [x.name, x.config])));
}
document.getElementById('views').onchange = e => {
  const store = JSON.parse(e.target.dataset.store || '{}');
  if (e.target.value && store[e.target.value]) { document.getElementById('view-name').value = e.target.value; applyConfig(store[e.target.value]); }
};
document.getElementById('view-save').onclick = async () => {
  const name = document.getElementById('view-name').value.trim();
  if (!name) return alert('Name the view first.');
  await api('/api/survey/admin/views/' + encodeURIComponent(name), { method: 'PUT', body: JSON.stringify({ config: currentConfig() }) });
  await loadViews();
  document.getElementById('views').value = name;
};
document.getElementById('view-del').onclick = async () => {
  const name = document.getElementById('views').value;
  if (!name || !confirm(`Delete saved view "${name}"?`)) return;
  await api('/api/survey/admin/views/' + encodeURIComponent(name), { method: 'DELETE' });
  await loadViews();
};

async function refresh() { await Promise.all([loadSummary(), loadData()]); }
document.getElementById('apply').onclick = refresh;
document.getElementById('clear').onclick = () => {
  ['f-district', 'f-store', 'f-resp', 'f-section', 'f-question'].forEach(id => setSelected(id, []));
  document.getElementById('f-status').value = 'submitted';
  document.getElementById('f-group').value = '';
  refresh();
};

(async function init() {
  try {
    await loadIdentity();
    await Promise.all([loadSpec(), loadFilters(), loadViews()]);
    await refresh();
  } catch (e) { console.error(e); }
})();
</script>
</body>
</html>
