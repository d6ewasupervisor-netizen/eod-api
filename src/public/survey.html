<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Division 701 Store Survey</title>
<script src="/auth-gate.js"></script>
<style>
  :root{
    --ink:#202b36; --ink-soft:#63707e; --line:#d9e0e7; --paper:#f4f6f8; --card:#fff;
    --accent:#0f5c8c; --accent-soft:#e3eef6; --good:#2e7d52; --saved:#2e7d52; --danger:#b3402a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--paper);color:var(--ink);font-family:"Segoe UI",system-ui,-apple-system,Arial,sans-serif;font-size:16px}
  header{position:sticky;top:0;z-index:5;background:var(--card);border-bottom:1px solid var(--line);padding:12px 16px}
  header .row{display:flex;align-items:center;gap:10px}
  header h1{font-size:16px;margin:0;flex:1}
  #save-state{font-size:12px;color:var(--ink-soft)}
  #save-state.saved{color:var(--saved)}
  .progress{height:4px;background:var(--line);border-radius:2px;margin-top:10px;overflow:hidden}
  .progress i{display:block;height:100%;background:var(--accent);width:0;transition:width .25s}
  @media (prefers-reduced-motion:reduce){.progress i{transition:none}}
  main{max-width:640px;margin:0 auto;padding:16px 16px 120px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
  .sec-title{font-size:13px;letter-spacing:.6px;text-transform:uppercase;color:var(--ink-soft);margin:4px 0 12px}
  .qtext{font-weight:600;margin-bottom:10px;line-height:1.35}
  .opts{display:flex;flex-wrap:wrap;gap:8px}
  .opt{border:1.5px solid var(--line);border-radius:10px;padding:12px 18px;background:#fff;font-size:16px;cursor:pointer;min-height:48px}
  .opt[aria-pressed="true"]{border-color:var(--accent);background:var(--accent-soft);font-weight:600}
  textarea,input[type=text]{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:12px;font-size:16px;font-family:inherit;background:#fff}
  textarea{min-height:72px;resize:vertical}
  .hint{font-size:13px;color:var(--ink-soft);margin-top:8px}
  .chip{display:inline-block;border:1px dashed var(--accent);color:var(--accent);border-radius:16px;padding:4px 12px;font-size:13px;cursor:pointer;background:#fff}
  details.comment{margin-top:10px}
  details.comment summary{font-size:13px;color:var(--accent);cursor:pointer;list-style:none;min-height:32px;display:flex;align-items:center}
  details.comment summary::before{content:"+ ";font-weight:700;margin-right:4px}
  details.comment[open] summary::before{content:"− "}
  .photo-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center}
  .photo-row img{width:64px;height:64px;object-fit:cover;border-radius:8px;border:1px solid var(--line)}
  .photo-add{border:1.5px dashed var(--line);border-radius:8px;width:64px;height:64px;display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--ink-soft);background:#fff;cursor:pointer}
  .thumb{position:relative}
  .thumb button{position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;background:var(--danger);color:#fff;border:0;font-size:12px;line-height:1;cursor:pointer;padding:0}
  nav.stepnav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);padding:12px 16px calc(12px + env(safe-area-inset-bottom));display:flex;gap:10px;z-index:5}
  nav.stepnav button{flex:1;min-height:50px;font-size:16px;border-radius:10px;border:0;cursor:pointer}
  #btn-back{background:#fff;border:1.5px solid var(--accent);color:var(--accent)}
  #btn-next{background:var(--accent);color:#fff;font-weight:600}
  #btn-next.submit{background:var(--good)}
  .store-btn{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:16px;font-size:16px;margin-bottom:10px;cursor:pointer}
  .store-btn .done{color:var(--good);font-size:13px;font-weight:600}
  .store-btn .draft{color:var(--accent);font-size:13px;font-weight:600}
  .review-item{padding:10px 0;border-bottom:1px solid var(--line);font-size:14px}
  .review-item .a{font-weight:600}
  .missing{color:var(--danger)}
  button:focus-visible,.opt:focus-visible,summary:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
</style>
</head>
<body>
<header>
  <div class="row">
    <h1 id="hdr-title">Division 701 Store Survey</h1>
    <span id="save-state" role="status" aria-live="polite"></span>
  </div>
  <div class="progress" aria-hidden="true"><i id="prog"></i></div>
</header>
<main id="main"></main>
<nav class="stepnav" id="stepnav" hidden>
  <button id="btn-back">Back</button>
  <button id="btn-next">Next</button>
</nav>

<script>
const API = (location.hostname === 'localhost') ? 'http://localhost:3001' : 'https://eod-api.the-dump-bin.com';
const authHeaders = () => ({ 'Authorization': 'Bearer ' + (localStorage.getItem('dumpBinSession') || ''), 'Content-Type': 'application/json' });
async function api(path, opts = {}) {
  const r = await fetch(API + path, { headers: authHeaders(), ...opts });
  if (r.status === 401) { location.href = '/signin.html?returnTo=' + encodeURIComponent(location.pathname); throw new Error('auth'); }
  return r.json();
}

let ME = null, SPEC = null, STORE = null, SECTION = -1; // -1 = store picker, sections.length = review
let ANSWERS = {}, PHOTOS = [], BASELINE = {}, saveTimer = null, dirty = false;

const $ = sel => document.querySelector(sel);
const main = $('#main');

function visibleBranches(q) {
  const v = ANSWERS[q.id];
  return (q.branches || []).filter(b => {
    const w = Array.isArray(b.when) ? b.when : [b.when];
    return v != null && w.includes(v);
  });
}
function sectionQuestions(sec) {
  const out = [];
  for (const q of sec.questions) { out.push(q); out.push(...visibleBranches(q)); }
  return out;
}
function answeredCount() {
  let total = 0, done = 0;
  for (const sec of SPEC.sections) for (const q of sectionQuestions(sec)) {
    if (q.optional) continue;
    total++;
    const v = ANSWERS[q.id];
    if (v != null && v !== '' && !(Array.isArray(v) && !v.length)) done++;
  }
  return { total, done };
}
function setProgress() {
  if (SECTION < 0 || !SPEC) { $('#prog').style.width = '0'; return; }
  const pct = SECTION >= SPEC.sections.length ? 100 : Math.round((SECTION / SPEC.sections.length) * 100);
  $('#prog').style.width = pct + '%';
}

// ---- autosave: after every change, debounced 800ms; flush on nav
function markDirty() {
  dirty = true;
  $('#save-state').textContent = 'Saving…'; $('#save-state').className = '';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveDraft, 800);
}
async function saveDraft(submit = false) {
  if (!STORE) return;
  clearTimeout(saveTimer);
  try {
    const r = await api(`/api/survey/stores/${STORE}/response`, {
      method: 'PUT',
      body: JSON.stringify({ answers: ANSWERS, photos: PHOTOS.map(p => ({ id: p.id, questionId: p.question_id })), submit }),
    });
    dirty = false;
    $('#save-state').textContent = submit ? 'Submitted ✓' : 'Saved ✓';
    $('#save-state').className = 'saved';
    return r;
  } catch (e) {
    $('#save-state').textContent = 'Offline — will retry';
    saveTimer = setTimeout(() => saveDraft(submit), 5000);
  }
}

// ---- store picker
async function renderPicker() {
  SECTION = -1; STORE = null; setProgress();
  $('#stepnav').hidden = true;
  $('#hdr-title').textContent = 'Division 701 Store Survey';
  const statuses = await Promise.all(ME.stores.map(async s => {
    try { const c = await api(`/api/survey/stores/${s}/context`); return [s, c.myResponse]; }
    catch { return [s, null]; }
  }));
  main.innerHTML = `<div class="card"><strong>Hi ${ME.user.name.split(' ')[0]}.</strong>
    <div class="hint">Pick a store to answer for. Your work saves automatically after every answer — you can leave and come back any time.</div></div>` +
    statuses.map(([s, resp]) => `<button class="store-btn" data-store="${s}">Store ${s}
      ${resp ? (resp.status === 'submitted' ? '<div class="done">Submitted — tap to review or update</div>' : '<div class="draft">Draft in progress</div>') : ''}
    </button>`).join('');
  main.querySelectorAll('.store-btn').forEach(b => b.onclick = () => openStore(Number(b.dataset.store)));
}

async function openStore(store) {
  STORE = store;
  const ctx = await api(`/api/survey/stores/${store}/context`);
  ANSWERS = ctx.myResponse ? { ...ctx.myResponse.answers } : {};
  const ph = await api(`/api/survey/stores/${store}/photos`);
  PHOTOS = (ph.photos || []).filter(p => p.respondent === ME.user.email);
  BASELINE = {};
  for (const b of (ctx.baseline || [])) Object.assign(BASELINE, b.answers);
  SECTION = 0;
  renderSection();
}

// ---- question renderers (every question gets an optional comment; photos optional)
function commentBlock(q) {
  const key = q.id + '_c', val = ANSWERS[key] || '';
  return `<details class="comment" ${val ? 'open' : ''}><summary>Add a comment</summary>
    <textarea data-comment="${q.id}" placeholder="Anything worth noting — exceptions, context, how it really works at this store.">${val}</textarea>
  </details>`;
}
function photoBlock(q) {
  if (!q.photo) return '';
  const mine = PHOTOS.filter(p => p.question_id === q.id);
  return `<div class="photo-row" data-photos="${q.id}">
    ${mine.map(p => `<span class="thumb"><img src="${API}/api/survey/photos/${p.id}?access_token=${encodeURIComponent(localStorage.getItem('dumpBinSession') || '')}" alt="Photo for ${q.id}"><button data-del="${p.id}" aria-label="Remove photo">×</button></span>`).join('')}
    <button class="photo-add" data-add="${q.id}" aria-label="Add photo">📷</button>
  </div><div class="hint">Photo of the area and surroundings — optional but helpful.</div>`;
}
function baselineChip(q) {
  const b = BASELINE[q.id];
  if (b == null || ANSWERS[q.id] != null) return '';
  return `<div class="hint">2025 answer: <button class="chip" data-chip="${q.id}" data-val="${b}">${b} — tap to use</button></div>`;
}
function questionHtml(q) {
  let body = '';
  if (q.type === 'yesno' || q.type === 'choice') {
    const opts = q.type === 'yesno' ? ['Yes', 'No'] : q.options;
    body = `<div class="opts" role="group" aria-label="${q.text}">` +
      opts.map(o => `<button class="opt" data-q="${q.id}" data-val="${o}" aria-pressed="${ANSWERS[q.id] === o}">${o}</button>`).join('') + '</div>';
  } else if (q.type === 'multiselect') {
    const cur = ANSWERS[q.id] || [];
    body = `<div class="opts">` + q.options.map(o =>
      `<button class="opt" data-mq="${q.id}" data-val="${o}" aria-pressed="${cur.includes(o)}">${o}</button>`).join('') + '</div>';
  } else {
    body = `<input type="text" data-tq="${q.id}" value="${(ANSWERS[q.id] || '').replace(/"/g, '&quot;')}" placeholder="Type your answer">`;
  }
  const detail = (q.detailOn && ANSWERS[q.id] === q.detailOn)
    ? `<div style="margin-top:8px"><input type="text" data-tq="${q.id}_d" value="${(ANSWERS[q.id + '_d'] || '').replace(/"/g, '&quot;')}" placeholder="Please explain"></div>` : '';
  return `<div class="card" data-qcard="${q.id}">
    <div class="qtext">${q.id.replace(/^Q/, '')}. ${q.text}${q.optional ? ' <span class="hint">(optional)</span>' : ''}</div>
    ${body}${detail}${baselineChip(q)}${photoBlock(q)}${commentBlock(q)}
  </div>`;
}

function renderSection() {
  setProgress();
  $('#stepnav').hidden = false;
  if (SECTION >= SPEC.sections.length) return renderReview();
  const sec = SPEC.sections[SECTION];
  $('#hdr-title').textContent = `Store ${STORE} — ${sec.title}`;
  main.innerHTML = `<div class="sec-title">Section ${sec.id} of ${SPEC.sections[SPEC.sections.length - 1].id} · ${sec.title}</div>` +
    sectionQuestions(sec).map(questionHtml).join('');
  $('#btn-back').textContent = SECTION === 0 ? 'All stores' : 'Back';
  $('#btn-next').textContent = SECTION === SPEC.sections.length - 1 ? 'Review' : 'Next';
  $('#btn-next').className = '';
  wire();
  window.scrollTo(0, 0);
}

function wire() {
  main.querySelectorAll('.opt[data-q]').forEach(b => b.onclick = () => {
    ANSWERS[b.dataset.q] = b.dataset.val;
    markDirty(); renderSection(); // re-render for branches/detail
  });
  main.querySelectorAll('.opt[data-mq]').forEach(b => b.onclick = () => {
    const id = b.dataset.mq, val = b.dataset.val;
    let cur = ANSWERS[id] || [];
    if (val === 'None') cur = cur.includes('None') ? [] : ['None'];
    else { cur = cur.filter(x => x !== 'None'); cur = cur.includes(val) ? cur.filter(x => x !== val) : [...cur, val]; }
    ANSWERS[id] = cur; markDirty(); renderSection();
  });
  main.querySelectorAll('input[data-tq]').forEach(i => i.oninput = () => { ANSWERS[i.dataset.tq] = i.value; markDirty(); });
  main.querySelectorAll('textarea[data-comment]').forEach(t => t.oninput = () => { ANSWERS[t.dataset.comment + '_c'] = t.value; markDirty(); });
  main.querySelectorAll('.chip[data-chip]').forEach(c => c.onclick = () => { ANSWERS[c.dataset.chip] = c.dataset.val; markDirty(); renderSection(); });
  main.querySelectorAll('[data-add]').forEach(b => b.onclick = () => addPhoto(b.dataset.add));
  main.querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
    await api('/api/survey/photos/' + b.dataset.del, { method: 'DELETE' });
    PHOTOS = PHOTOS.filter(p => p.id !== Number(b.dataset.del));
    markDirty(); renderSection();
  });
}

// ---- photo capture + client-side compression (~1280px jpeg)
function addPhoto(questionId) {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*'; input.capture = 'environment';
  input.onchange = async () => {
    const file = input.files[0]; if (!file) return;
    $('#save-state').textContent = 'Uploading photo…';
    const img = await new Promise((res, rej) => { const i = new Image(); i.onload = () => res(i); i.onerror = rej; i.src = URL.createObjectURL(file); });
    const scale = Math.min(1, 1280 / Math.max(img.width, img.height));
    const cv = document.createElement('canvas');
    cv.width = Math.round(img.width * scale); cv.height = Math.round(img.height * scale);
    cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
    const dataUrl = cv.toDataURL('image/jpeg', 0.72);
    const b64 = dataUrl.split(',')[1];
    const r = await api(`/api/survey/stores/${STORE}/photos`, {
      method: 'POST', body: JSON.stringify({ questionId, mime: 'image/jpeg', data: b64 }),
    });
    if (r.ok) { PHOTOS.push({ ...r.photo, respondent: ME.user.email }); markDirty(); renderSection(); }
    else { $('#save-state').textContent = r.error || 'Photo failed'; }
  };
  input.click();
}

// ---- review + submit
function renderReview() {
  $('#hdr-title').textContent = `Store ${STORE} — Review`;
  const { total, done } = answeredCount();
  let items = '';
  for (const sec of SPEC.sections) for (const q of sectionQuestions(sec)) {
    const v = ANSWERS[q.id];
    const disp = v == null || v === '' || (Array.isArray(v) && !v.length)
      ? (q.optional ? '<span class="hint">skipped</span>' : '<span class="missing">not answered</span>')
      : `<span class="a">${Array.isArray(v) ? v.join(', ') : v}</span>`;
    const c = ANSWERS[q.id + '_c'] ? `<div class="hint">💬 ${ANSWERS[q.id + '_c']}</div>` : '';
    items += `<div class="review-item">${q.id.replace(/^Q/, '')}. ${q.text}<br>${disp}${c}</div>`;
  }
  main.innerHTML = `<div class="card"><strong>${done} of ${total} questions answered.</strong>
    <div class="hint">${done < total ? 'You can submit anyway — unanswered items stay blank — or go back and finish.' : 'Everything answered. Submit when ready.'}</div></div>
    <div class="card">${items}</div>`;
  $('#btn-back').textContent = 'Back';
  $('#btn-next').textContent = 'Submit for this store';
  $('#btn-next').className = 'submit';
  window.scrollTo(0, 0);
}

$('#btn-back').onclick = async () => {
  await saveDraft();
  if (SECTION <= 0) return renderPicker();
  SECTION--; renderSection();
};
$('#btn-next').onclick = async () => {
  if (SECTION >= SPEC.sections.length) {
    const r = await saveDraft(true);
    if (r && r.ok) {
      main.innerHTML = `<div class="card"><strong>Store ${STORE} submitted. ✓</strong>
        <div class="hint">You can reopen it any time to update answers — updates replace your submission for this store.</div></div>`;
      $('#stepnav').hidden = true;
      setTimeout(renderPicker, 1400);
    }
    return;
  }
  await saveDraft();
  SECTION++; renderSection();
};
window.addEventListener('beforeunload', e => { if (dirty) { saveDraft(); } });

(async function init() {
  try {
    const [me, q] = await Promise.all([api('/api/survey/me'), api('/api/survey/questions')]);
    if (!me.ok) { main.innerHTML = `<div class="card">${me.error || 'You are not on the survey roster. Contact me if that seems wrong.'}</div>`; return; }
    ME = me; SPEC = q.questionSet.spec;
    renderPicker();
  } catch (e) { console.error(e); }
})();
</script>
</body>
</html>
