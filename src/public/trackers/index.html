<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trackers</title>
  <link rel="stylesheet" href="/trackers/assets/trackers.css?v=20260607-4" />
  <script src="/auth-gate.js"></script>
</head>
<body>
  <main class="container">
    <header class="header">
      <div>
        <h1>Tracker</h1>
      </div>
      <div id="connectionStatus" class="connection-status" aria-live="polite">
        <span class="connection-pill"><span class="bulb bulb-wait"></span>PROD</span>
        <span class="connection-pill"><span class="bulb bulb-wait"></span>SI</span>
      </div>
    </header>

    <section class="card">
      <h2>New Run</h2>
      <form id="runForm" class="form-grid">
        <label>Stores<input id="stores" placeholder="19,23,53" /></label>
        <label>Districts
          <select id="districts" multiple size="5"></select>
        </label>
        <fieldset class="project-field">
          <legend>Projects</legend>
          <div id="projectChoices" class="choice-grid"></div>
        </fieldset>
        <label>Fiscal Year
          <select id="fiscalYear"></select>
        </label>
        <label>Period
          <select id="period"></select>
        </label>
        <label>Week
          <select id="week">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
          </select>
        </label>
        <label>Date From<input id="dateFrom" type="date" /></label>
        <label>Date To<input id="dateTo" type="date" /></label>
        <button type="submit">Start Run</button>
      </form>
      <p id="runEstimate" class="hint">Choose stores or districts, then start a run.</p>
    </section>

    <section class="card">
      <h2>Run</h2>
      <div class="progress-shell"><div id="runProgressBar" class="progress-bar" style="width: 0%"></div></div>
      <div id="runStatus" class="run-status">No run started.</div>
      <div class="run-control-row">
        <button id="cancelRun" type="button" class="danger-button hidden">Cancel Run</button>
      </div>
      <div id="runError" class="alert hidden"></div>
      <div id="runActions" class="run-actions hidden">
        <a id="manifestJson" target="_blank" rel="noreferrer">Manifest JSON</a>
        <a id="manifestCsv" target="_blank" rel="noreferrer">Manifest CSV</a>
      </div>
    </section>

    <section class="card">
      <h2>Results</h2>
      <div class="filters">
        <label>Search dbkey/category<input id="search" /></label>
        <label>Store<input id="filterStore" inputmode="numeric" /></label>
        <label>Confidence
          <select id="confidence">
            <option value="">All</option>
            <option value="high">high</option>
            <option value="needs_review">needs_review</option>
          </select>
        </label>
        <label>Status
          <select id="status">
            <option value="">All</option>
            <option value="matched_done">Matched done</option>
            <option value="done_photo_mismatch">Done, photo mismatch</option>
            <option value="si_incomplete">SI incomplete</option>
            <option value="missing_in_si">Missing in SI</option>
            <option value="si_unverified">SI unverified</option>
            <option value="si_excluded">SI excluded (PROD-only)</option>
            <option value="missing_in_prod">Missing in PROD</option>
            <option value="off_scope_si">Off-scope SI</option>
            <option value="legacy">Legacy</option>
          </select>
        </label>
        <label>Sort
          <select id="sort">
            <option value="store">Store</option>
            <option value="date">Date</option>
            <option value="dbkey">DBKey</option>
            <option value="category">Category</option>
            <option value="confidence">Confidence</option>
            <option value="prodPhotos">PROD photos</option>
            <option value="siPhotos">SI photos</option>
          </select>
        </label>
        <label>Order
          <select id="order">
            <option value="asc">Asc</option>
            <option value="desc">Desc</option>
          </select>
        </label>
        <button id="refreshResults" type="button">Refresh</button>
      </div>
      <div id="summary" class="summary-grid"></div>
      <div class="pager">
        <button id="prevPage" type="button">Previous</button>
        <span id="pageStatus">Page 1</span>
        <button id="nextPage" type="button">Next</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Store</th>
            <th>Date</th>
            <th>Period</th>
            <th>DBKey</th>
            <th>Category</th>
            <th>PROD</th>
            <th>SI</th>
            <th>Photos</th>
            <th>Confidence</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </section>

    <dialog id="imagesDialog">
      <h3>Source Images</h3>
      <div id="imagesGrid" class="images-grid"></div>
      <button id="closeImages" type="button">Close</button>
    </dialog>

    <dialog id="fullImageDialog" class="full-image-dialog">
      <div class="full-image-toolbar">
        <strong id="fullImageTitle">Source image</strong>
        <button id="closeFullImage" type="button">Close</button>
      </div>
      <div class="full-image-frame">
        <img id="fullImage" alt="Full-size tracker source" />
      </div>
    </dialog>
  </main>

  <script src="/trackers/assets/trackers.js?v=20260607-4"></script>
</body>
</html>
