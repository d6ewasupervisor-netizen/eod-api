<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trackers Admin</title>
  <link rel="stylesheet" href="/trackers/assets/trackers.css" />
  <script src="/auth-gate.js"></script>
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>Trackers Admin</h1>
      <p>Restricted settings for tracker runtime tuning.</p>
    </header>

    <section class="card">
      <h2>Current Access</h2>
      <div id="adminStatus">Checking...</div>
      <div id="auditStatus" class="hint"></div>
    </section>

    <section class="card">
      <h2>Runtime Settings</h2>
      <form id="settingsForm" class="form-grid">
        <label>
          Tracker Allowed Emails (comma-separated)
          <input id="trackerAllowedEmails" placeholder="person1@example.com,person2@example.com" />
        </label>
        <label>
          Allow Supervisors
          <select id="trackerAllowSupervisors">
            <option value="true">true</option>
            <option value="false">false</option>
          </select>
        </label>
        <label>
          Allow Admins
          <select id="trackerAllowAdmins">
            <option value="true">true</option>
            <option value="false">false</option>
          </select>
        </label>
        <label>Rebotics Request Timeout (ms)<input id="reboticsRequestTimeoutMs" type="number" min="2000" max="60000" required /></label>
        <label>Rebotics Actions Page Limit<input id="reboticsActionsPageLimit" type="number" min="10" max="500" required /></label>
        <label>Rebotics Max Action Pages<input id="reboticsMaxActionPages" type="number" min="1" max="200" required /></label>
        <label>Rebotics Max Task Pages<input id="reboticsMaxTaskPages" type="number" min="1" max="200" required /></label>
        <label>Rebotics Max Attempts<input id="reboticsMaxAttempts" type="number" min="1" max="5" required /></label>
        <label>Rebotics Concurrency<input id="reboticsConcurrency" type="number" min="1" max="10" required /></label>
        <label>SAS Request Timeout (ms)<input id="sasRequestTimeoutMs" type="number" min="5000" max="120000" required /></label>
        <label>SAS Max Attempts<input id="sasMaxAttempts" type="number" min="1" max="5" required /></label>
        <label>SAS Concurrency<input id="sasConcurrency" type="number" min="1" max="10" required /></label>
        <label>Run Items Default Page Size<input id="runItemsPageSizeDefault" type="number" min="10" max="500" required /></label>
        <label>Run Items Max Page Size<input id="runItemsPageSizeMax" type="number" min="50" max="1000" required /></label>
        <label>Max Stores Per Run<input id="maxRunStores" type="number" min="1" max="500" required /></label>
        <label>Max Days Per Run<input id="maxRunDates" type="number" min="1" max="60" required /></label>
        <label>Max Store/Day/Project Checks<input id="maxRunWorkUnits" type="number" min="1" max="25000" required /></label>
        <button type="submit">Save Settings</button>
      </form>
      <p id="saveStatus" class="hint"></p>
    </section>
  </main>
  <script src="/trackers/assets/trackers-admin.js"></script>
</body>
</html>
